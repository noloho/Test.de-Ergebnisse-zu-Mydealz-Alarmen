<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Test.de -> Mydealz Einstellungen</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="container">
      <h1>Test.de -> Mydealz</h1>
      <p class="muted">Einstellungen für die Erstellung von Deal-Alarmen.</p>

      <form id="settings-form">
        <label>
          Temperatur (Votes)
          <input type="number" id="temperature" min="0" step="1" />
        </label>

        <label>
          Mindestpreis (EUR)
          <input type="number" id="minPrice" min="0" step="0.01" />
        </label>

        <label>
          Höchstpreis (EUR)
          <input type="number" id="maxPrice" min="0" step="0.01" />
        </label>

        <label class="checkbox">
          <input type="checkbox" id="sendEmail" />
          E-Mail-Benachrichtigungen senden
        </label>

        <label class="checkbox">
          <input type="checkbox" id="enableBrowserPushNotification" />
          Browser-Push-Benachrichtigungen aktivieren
        </label>

        <label class="checkbox">
          <input type="checkbox" id="isDailyDigest" />
          Tagesübersicht statt sofortiger E-Mails
        </label>


        <button type="submit">Speichern</button>
        <span id="status" class="muted"></span>
      </form>
    </main>

    <script src="options.js"></script>
  </body>
</html>
