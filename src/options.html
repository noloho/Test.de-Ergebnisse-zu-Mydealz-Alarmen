<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Test.de -> Mydealz Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="container">
      <h1>Test.de -> Mydealz</h1>
      <p class="muted">Settings for deal alarm creation.</p>

      <form id="settings-form">
        <label>
          Temperature (votes)
          <input type="number" id="temperature" min="0" step="1" />
        </label>

        <label>
          Min price (EUR)
          <input type="number" id="minPrice" min="0" step="0.01" />
        </label>

        <label>
          Max price (EUR)
          <input type="number" id="maxPrice" min="0" step="0.01" />
        </label>

        <label class="checkbox">
          <input type="checkbox" id="sendEmail" />
          Send email notifications
        </label>

        <label class="checkbox">
          <input type="checkbox" id="enableBrowserPushNotification" />
          Enable browser push notifications
        </label>

        <label class="checkbox">
          <input type="checkbox" id="isDailyDigest" />
          Daily digest instead of immediate emails
        </label>

        <button type="submit">Save</button>
        <span id="status" class="muted"></span>
      </form>
    </main>

    <script src="options.js"></script>
  </body>
</html>
